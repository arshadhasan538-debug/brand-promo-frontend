<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brand Promotion Platform</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }
    header {
      padding: 40px 20px;
      text-align: center;
      background: linear-gradient(135deg, #2563eb, #9333ea);
    }
    section {
      padding: 30px 20px;
      max-width: 600px;
      margin: auto;
    }
    h2 {
      margin-bottom: 10px;
    }
    p {
      opacity: 0.9;
    }
    .card {
      background: #020617;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }
    input, textarea {
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
    }
    button {
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<header>
  <h1>Brand Promotion Platform 🚀</h1>
  <p>We help brands grow with real promotion</p>
</header>

<section>
  <div class="card">
    <h2>Why Choose Us?</h2>
    <p>✔ Social media promotion</p>
    <p>✔ Influencer marketing</p>
    <p>✔ Affordable pricing</p>
  </div>

  <div class="card">
    <h2>Contact Us 📩</h2>

    <<form name="contact" method="POST" data-netlify="true" action="/thank-you.html">!-- NETLIFY CONTACT FORM -->
    
      <input type="hidden" name="form-name" value="contact">

      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Tell us about your brand" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>
</section>

<footer>
  © 2026 BrandPromo. All rights reserved.
</footer>

</body>
  </html>
