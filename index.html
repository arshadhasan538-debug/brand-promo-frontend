<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brand Promo</title>

  <!-- ✅ CSS YAHAN ADD HAI -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    .container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    form {
      background: #ffffff;
      padding: 20px;
      border-radius: 10px;
      width: 100%;
      max-width: 350px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    input, textarea {
      padding: 10px;
      font-size: 14px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    textarea {
      resize: none;
      height: 80px;
    }

    button {
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

  <div class="container">
    <form name="contact" method="POST" data-netlify="true">
      <input type="hidden" name="form-name" value="contact">

      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Message"></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>

</body>
  </html>
